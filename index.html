<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<main class="app">
  <header class="header">
    <h1>Workout Generator</h1>
    <p class="subtitle">Strength • Conditioning • Aerobic Base</p>
  </header>

  <section class="controls">

    <div class="control-group">
      <div class="label">Goal</div>
      <div class="button-row" data-group="goal">
        <button data-value="strength">Strength</button>
        <button data-value="hypertrophy" class="active">Hypertrophy</button>
        <button data-value="conditioning">Conditioning</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Time (mins)</div>
      <div class="button-row" data-group="time">
        <button data-value="15">15</button>
        <button data-value="30" class="active">30</button>
        <button data-value="45">45</button>
        <button data-value="60">60</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Cardio Placement</div>
      <div class="button-row" data-group="cardioPlacement">
        <button data-value="end" class="active">End</button>
        <button data-value="start">Start</button>
      </div>
    </div>

    <div class="actions">
      <button id="generate" class="btn primary">Generate Workout</button>
      <button id="start" class="big-action" disabled>Start Workout</button>
    </div>

  </section>

  <section class="preview">
    <h2>Session Preview</h2>
    <div id="preview"></div>
  </section>
</main>

<section id="workoutScreen" class="workout hidden">
  <div id="workoutCard"></div>
  <button id="exit" class="btn ghost">Exit</button>
</section>

<!-- Onboarding -->
<div id="onboarding" class="onboarding hidden">
  <div class="onboarding-card">
    <h2 id="onboard-title"></h2>
    <p id="onboard-text"></p>
    <button id="onboard-next" class="big-action">Next</button>
    <button id="onboard-skip" class="btn ghost">Skip</button>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
