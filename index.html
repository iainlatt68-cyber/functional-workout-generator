<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Functional Workout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background-glow"></div>
  <div class="app">

    <h1>Functional Workout Generator</h1>

    <!-- CONTROLS -->
    <div class="controls">
      <label>
        Training Goal
        <select id="goal">
          <option value="strength">Strength</option>
          <option value="conditioning">Conditioning</option>
          <option value="hybrid" selected>Hybrid</option>
        </select>
      </label>

      <label>
        Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>

      <label>
        Equipment
        <select id="equipment" multiple>
          <option value="kettlebell">Kettlebell</option>
          <option value="sandbag">Sandbag</option>
          <option value="bodyweight" selected>Bodyweight</option>
        </select>
      </label>

      <label>
        Exercises per equipment
        <select id="rounds">
          <option>1</option>
          <option>2</option>
          <option selected>3</option>
          <option>4</option>
          <option>5</option>
        </select>
      </label>

      <button id="generateWorkout">Generate Workout</button>
      <button id="startWorkout" disabled>Start Workout</button>
    </div>

    <!-- PREVIEW -->
    <div id="workoutDisplay" class="preview"></div>

    <!-- ACTIVE WORKOUT -->
    <div id="activeWorkout" class="active"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
