<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="header">
    <h1>Workout Generator</h1>
    <p class="subtitle">Train with intent • Finish strong</p>
  </header>

  <!-- CONTROL PANEL -->
  <section class="controls">

    <div class="control-card primary">
      <h3>Today’s focus</h3>
      <div class="option-row" data-key="goal">
        <button class="active" data-value="strength">Get stronger</button>
        <button data-value="muscle">Build muscle</button>
        <button data-value="fitness">Improve fitness</button>
      </div>
    </div>

    <div class="control-card">
      <h3>Equipment</h3>
      <div class="option-row" data-key="equipment">
        <button class="active" data-value="gym">Gym</button>
        <button data-value="minimal">Minimal</button>
      </div>
    </div>

    <div class="control-card">
      <h3>Session length</h3>
      <div class="option-row" data-key="duration">
        <button data-value="30">30 min</button>
        <button class="active" data-value="45">45 min</button>
        <button data-value="60">60 min</button>
      </div>
    </div>

    <div class="control-card">
      <h3>How should it feel?</h3>
      <div class="option-row" data-key="effort">
        <button data-value="light">Light</button>
        <button class="active" data-value="moderate">Challenging</button>
        <button data-value="hard">Push</button>
      </div>
    </div>

    <div class="control-card">
      <h3>Conditioning</h3>
      <div class="option-row" data-key="conditioning">
        <button class="active" data-value="easy">Easy aerobic</button>
        <button data-value="structured">Structured intervals</button>
        <button data-value="hard">Hard finisher</button>
      </div>

      <div class="option-row subtle" data-key="placement">
        <button data-value="before">Before lifting</button>
        <button class="active" data-value="after">After lifting</button>
      </div>
    </div>

    <button id="generate" class="big-action primary">Build my session</button>
    <button id="start" class="big-action secondary" disabled>Start workout</button>

  </section>

  <!-- PREVIEW -->
  <section class="preview">
    <h2>Session overview</h2>
    <div id="preview" class="flow-preview"></div>
  </section>
</main>

<!-- WORKOUT MODE -->
<section id="workout" class="workout hidden">
  <div id="card"></div>
</section>

<script src="app.js"></script>
</body>
</html>
