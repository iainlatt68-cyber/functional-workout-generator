<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <h1>Workout Generator</h1>

    <div class="controls">
      <label>
        Goal
        <select id="goal">
          <option value="strength">Strength</option>
          <option value="conditioning">Conditioning</option>
          <option value="hybrid" selected>Hybrid</option>
        </select>
      </label>

      <label>
        Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </label>

      <label>
        Equipment
        <select id="equipment" multiple>
          <option value="kettlebell">Kettlebell</option>
          <option value="sandbag">Sandbag</option>
          <option value="bodyweight" selected>Bodyweight</option>
        </select>
      </label>

      <label>
        Moves per equipment
        <select id="count">
          <option>1</option>
          <option>2</option>
          <option selected>3</option>
          <option>4</option>
          <option>5</option>
        </select>
      </label>

      <button id="generate">Generate</button>
      <button id="start" disabled>Start Workout</button>
    </div>

    <div id="preview"></div>
  </div>

  <div id="workoutScreen" class="workout hidden"></div>

  <script src="app.js"></script>
</body>
</html>
