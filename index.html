<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>

  <!-- ✅ REAL CSS LOAD -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="header">
    <h1>Workout Generator</h1>
    <p class="subtitle">Train with intent • Finish strong</p>
  </header>

  <section class="controls">
    <div class="control-group">
      <div class="label">Goal</div>
      <div class="button-row" data-group="goal">
        <button data-value="strength">Strength</button>
        <button data-value="hypertrophy" class="active">Hypertrophy</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Rounds</div>
      <div class="button-row" data-group="rounds">
        <button data-value="2">2</button>
        <button data-value="3" class="active">3</button>
        <button data-value="4">4</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Conditioning</div>
      <div class="button-row" data-group="condMode">
        <button data-value="zone2" class="active">Zone 2</button>
        <button data-value="emom">EMOM</button>
        <button data-value="amrap">AMRAP</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Cardio timing</div>
      <div class="button-row" data-group="cardioPlacement">
        <button data-value="start">Start</button>
        <button data-value="end" class="active">End</button>
      </div>
    </div>

    <div class="actions">
      <button id="generate" class="btn primary">Generate Workout</button>
      <button id="start" class="big-action" disabled>Start Workout</button>
    </div>
  </section>

  <section class="preview">
    <h2>Session flow</h2>
    <div id="preview" class="flow-preview"></div>
  </section>
</main>

<!-- WORKOUT MODE -->
<div id="workoutRoot" class="workout hidden">
  <div id="workoutCard"></div>
</div>

<!-- ✅ REAL JS LOAD -->
<script src="app.js"></script>
</body>
</html>
