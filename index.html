<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functional Fitness Generator</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <h1>Functional Fitness Generator</h1>

    <section class="setup-card">

      <h2>Build Your Session</h2>

      <label for="level">Experience level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label for="goal">Training goal</label>
      <select id="goal">
        <option value="strength">Strength</option>
        <option value="hypertrophy">Hypertrophy</option>
        <option value="conditioning">Conditioning</option>
        <option value="recovery">Recovery</option>
      </select>

      <label for="equipment">Equipment available</label>
      <select id="equipment">
        <option value="bodyweight">Bodyweight</option>
        <option value="dumbbells">Dumbbells</option>
        <option value="gym">Full gym</option>
      </select>

      <fieldset style="margin-bottom:14px;">
        <legend>User preferences</legend>
        <label><input type="checkbox" id="noJumping" /> Avoid jumping</label><br />
        <label><input type="checkbox" id="noOverhead" /> Avoid overhead lifts</label>
      </fieldset>

      <label for="days">Workout days per week</label>
      <select id="days">
        <option value="3">3 days</option>
        <option value="4">4 days</option>
        <option value="5">5 days</option>
      </select>

      <button id="generateWorkoutBtn" type="button">
        Generate Plan
      </button>

      <button id="startWorkoutBtn" type="button" style="margin-top:8px;">
        Start Workout
      </button>

    </section>

    <div id="workoutOutput"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
