<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functional Fitness Generator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Functional Fitness Generator</h1>
    <h2>Build your session</h2>

    <section class="setup-card">

      <!-- GOAL -->
      <label for="goal">Training Goal</label>
      <select id="goal">
        <option value="conditioning">Conditioning</option>
        <option value="strength">Strength</option>
        <option value="hypertrophy">Hypertrophy</option>
        <option value="recovery">Recovery</option>
      </select>

      <!-- MODE -->
      <label for="mode">Workout Mode</label>
      <select id="mode">
        <option value="normal">Standard</option>
        <option value="emom">EMOM</option>
        <option value="amrap">AMRAP</option>
      </select>

      <!-- EQUIPMENT -->
      <label for="equipment">Equipment</label>
      <select id="equipment">
        <option value="bodyweight">Bodyweight</option>
        <option value="dumbbells">Dumbbells</option>
        <option value="gym">Gym</option>
      </select>

      <!-- ROUNDS -->
      <label for="rounds">Rounds</label>
      <select id="rounds">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <!-- TEMPLATES -->
      <label for="template">Workout Template</label>
      <select id="template">
        <option value="">Custom</option>
        <option value="burner">Conditioning Burner</option>
        <option value="strength">Strength Block</option>
        <option value="recovery">Recovery Day</option>
      </select>

      <!-- ACTIONS -->
      <button id="generateWorkoutBtn">Generate Workout</button>
      <button id="startWorkoutBtn">Start Workout</button>

    </section>

    <div id="workoutOutput"></div>

  </main>

  <script src="app.js"></script>

</body>
</html>
