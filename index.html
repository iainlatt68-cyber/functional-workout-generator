<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functional Fitness Generator</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <main class="container">
    <h1>Functional Fitness Generator</h1>

    <section class="setup-card">
      <h2>Workout Setup</h2>

      <label for="level">Fitness level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label for="duration">Workout length</label>
      <select id="duration">
        <option value="10">10–15 minutes</option>
        <option value="20">20–30 minutes</option>
        <option value="40">40+ minutes</option>
      </select>
      
      <label for="style">Workout style</label>
      <select id="style">
      <option value="strength">Strength</option>
      <option value="conditioning">Conditioning</option>
      <option value="emom">EMOM</option>
      <option value="amrap">AMRAP</option>
      </select>
      
      <label for="equipment">Equipment</label>
      <select id="equipment">
        <option value="bodyweight">Bodyweight</option>
        <option value="dumbbells">Dumbbells</option>
        <option value="bands">Resistance bands</option>
        <option value="gym">Full Gym</option>
      </select>
    </section>
    
    <label for="rounds">Circuits / Rounds</label>
<select id="rounds">
  <option value="1">1 round (straight sets)</option>
  <option value="2">2 rounds</option>
  <option value="3">3 rounds</option>
  <option value="4">4 rounds</option>
</select>
    
    <button id="generateWorkoutBtn" type="button">
      Generate Workout
    </button>

    <section id="workoutOutput"></section>

    <section class="timer">
      <div id="timer">Ready</div>
      <button id="startTimerBtn" type="button">
        Start Workout
      </button>
    </section>
  </main>
</body>
</html>
