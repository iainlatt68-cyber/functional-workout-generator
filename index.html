<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="header">
    <h1>Workout Generator</h1>
    <p class="subtitle">Strength • Conditioning • Aerobic Base</p>
  </header>

  <section class="controls">

    <div class="control-group">
      <div class="label">Goal</div>
      <div class="button-row" data-group="goal">
        <button data-value="strength">Strength</button>
        <button data-value="hypertrophy" class="active">Hypertrophy</button>
        <button data-value="conditioning">Conditioning</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Equipment</div>
      <div class="button-row" data-group="equipment">
        <button data-value="fullgym" class="active">Full Gym</button>
        <button data-value="dumbbells">Dumbbells</button>
        <button data-value="kettlebell">Kettlebell</button>
        <button data-value="sandbag">Sandbag</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Difficulty</div>
      <div class="button-row" data-group="difficulty">
        <button data-value="easy">Easy</button>
        <button data-value="moderate" class="active">Moderate</button>
        <button data-value="hard">Hard</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Rounds</div>
      <div class="button-row" data-group="rounds">
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3" class="active">3</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
      </div>
    </div>

    <div class="control-group">
      <div class="label">Conditioning Mode</div>
      <div class="button-row" data-group="condMode">
        <button data-value="zone2" class="active">Zone 2</button>
        <button data-value="emom">EMOM</button>
        <button data-value="amrap">AMRAP</button>
      </div>
    </div>

    <div class="actions">
      <button id="generate" class="btn primary">Generate Workout</button>
      <button id="start" class="big-action" disabled>Start Workout</button>
    </div>

  </section>

  <section class="preview">
    <h2>Session Preview</h2>
    <div id="preview"></div>
  </section>
</main>

<section id="workoutScreen" class="workout hidden">
  <div id="workoutCard" class="workout-card"></div>
  <button id="exit" class="btn ghost">Exit</button>
</section>

<!-- ONBOARDING -->
<div id="onboarding" class="onboarding hidden">
  <div class="onboarding-card">
    <h2 id="onboard-title"></h2>
    <p id="onboard-text"></p>
    <div class="onboard-actions">
      <button id="onboard-next" class="big-action">Next</button>
      <button id="onboard-skip" class="btn ghost">Skip</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
