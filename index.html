<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functional Fitness Generator</title>

  <!-- ✅ Proper CSS link -->
  style.css
</head>
<body>

  <main class="container">

    <h1>Functional Fitness Generator</h1>

    <div class="setup-card">

      <h2>Build Your Workout</h2>

      <label for="level">Fitness level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label for="rounds">Rounds</label>
      <select id="rounds">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <!-- ✅ THESE ARE THE BUTTONS YOUR JS LOOKS FOR -->
      <button id="generateWorkoutBtn" type="button">
        Generate Workout
      </button>

      <button id="startWorkoutBtn" type="button" style="margin-top: 8px;">
        Start Workout
      </button>

    </div>

    <div id="workoutOutput"></div>

  </main>

  <!-- ✅ Proper JS script (ONLY ONE, at the bottom) -->
  app.js</script>

</body>
</html>
