<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Generator</title>

  <!-- ✅ CORRECT CSS LINK -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <main class="app">
    <h1>Workout Generator</h1>

    <div class="controls">

      <div class="button-row" data-group="goal">
        <button type="button" data-value="strength">Strength</button>
        <button type="button" data-value="hypertrophy" class="active">Hypertrophy</button>
        <button type="button" data-value="conditioning">Conditioning</button>
      </div>

      <div class="button-row" data-group="time">
        <button type="button" data-value="20">20</button>
        <button type="button" data-value="30" class="active">30</button>
        <button type="button" data-value="45">45</button>
      </div>

      <button id="generate" type="button">Generate Workout</button>
      <button id="start" type="button" disabled>Start Workout</button>

    </div>

    <div id="preview"></div>
  </main>

  <section id="workoutScreen" class="hidden">
    <div id="workoutCard"></div>
    <button id="exit" type="button">Exit</button>
  </section>

  <!-- ✅ CORRECT JS SCRIPT TAG -->
  <script src="./app.js"></script>

</body>
</html>
