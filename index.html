<!DOCTYPE html>

<p style="color:#9ca3af;margin-bottom:18px">
  Build. Execute. Recover. Repeat.
</p>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Functional Fitness Generator</title>

<p class="app-intro">
  Build a focused session based on your goal, kit and experience.
</p>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Functional Fitness Generator</h1>

    <section class="setup-card">

      <h2>Build Your Workout</h2>

      <label for="level">Experience level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label for="goal">Training goal</label>
      <select id="goal">
        <option value="strength">Strength</option>
        <option value="hypertrophy">Hypertrophy</option>
        <option value="conditioning">Conditioning</option>
        <option value="recovery">Recovery</option>
      </select>

      <label for="equipment">Equipment</label>
      <select id="equipment">
        <option value="bodyweight">Bodyweight</option>
        <option value="dumbbells">Dumbbells</option>
        <option value="gym">Full gym</option>
      </select>

      <label for="rounds">Rounds</label>
      <select id="rounds">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <button id="generateWorkoutBtn" type="button">
        Generate Workout
      </button>

      <button id="startWorkoutBtn" type="button">
        Start Workout
      </button>

    </section>

    <div id="workoutOutput"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
