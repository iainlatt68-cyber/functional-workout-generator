<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functional Fitness Generator</title>

  <!-- Correct CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Functional Fitness Generator</h1>

    <section class="setup-card">

      <h2>Build Your Workout</h2>

      <!-- FITNESS LEVEL -->
      <label for="level">Fitness level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <!-- TRAINING GOAL -->
      <label for="goal">Training goal</label>
      <select id="goal">
        <option value="strength">Strength</option>
        <option value="hypertrophy">Hypertrophy</option>
        <option value="conditioning">Conditioning</option>
        <option value="recovery">Recovery</option>
      </select>

      <!-- AVAILABLE EQUIPMENT -->
      <label for="equipment">Available equipment</label>
      <select id="equipment">
        <option value="bodyweight">Bodyweight only</option>
        <option value="dumbbells">Dumbbells</option>
        <option value="gym">Full gym</option>
      </select>

      <!-- ROUNDS -->
      <label for="rounds">Rounds</label>
      <select id="rounds">
        <option value="1">1 Round</option>
        <option value="2">2 Rounds</option>
        <option value="3">3 Rounds</option>
      </select>

      <button id="generateWorkoutBtn" type="button">
        Generate Workout
      </button>

      <button id="startWorkoutBtn" type="button" style="margin-top: 8px;">
        Start Workout
      </button>

    </section>

    <div id="workoutOutput"></div>

  </main>

  <!-- Correct JS -->
  <script src="app.js"></script>

</body>
</html>
